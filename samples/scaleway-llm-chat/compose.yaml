name: scw-llm-chat
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - target: 8000
        mode: ingress
    restart: unless-stopped
    environment:
      - LLM_URL=https://api.scaleway.ai/v1/
      - LLM_MODEL=llama-3.3-70b-instruct
      - OPENAI_API_KEY=${SCW_SECRET_KEY}
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import sys, urllib.request; urllib.request.urlopen(sys.argv[1]).read()
        - http://localhost:8000/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
