name: Nightly Build

on:
  schedule:
    - cron: "0 6 * * *" # every day at 6 AM UTC
  workflow_dispatch: # optional: allows manual runs

permissions:
  contents: write

jobs:
  goreleaser-nightly:
    runs-on: ubuntu-latest
    environment: release

    steps:
      # Checkout the repository
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

        # Get go
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
        # Execute goreleaser nightly run (see .goreleaser.yml nightly for details)
      - uses: goreleaser/goreleaser-action@9a127d869fb706213d29cdf8eef3a4ea2b869415 # v7
        with:
          distribution: goreleaser-pro
          version: latest
          workdir: src
          args: release --clean --nightly --skip=announce --config=.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          NIGHTLY: true

      - name: Slack Notification
        if: failure()
        uses: rtCamp/action-slack-notify@cdf0a2130cbcdfd82ba5fcac8e076370bf381b36 # v2
        env:
          MSG_MINIMAL: actions url
          SLACK_COLOR: failure
          SLACK_FOOTER: ""
          SLACK_MESSAGE: ""
          SLACK_TITLE: Defang CLI Nightly Build failed
          SLACK_WEBHOOK: ${{ secrets.SLACK_NOTIFIER_WEBHOOK_URL }}
