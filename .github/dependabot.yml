version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # Only major version bumps; security advisories always bypass ignore rules.
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
