services:
  alt-repo:
    x-defang-llm: true
    image: "altrepo.com/litellm:latest"
    networks:
      default: null
    ports:
      - mode: host
        target: "4000"
        protocol: tcp
  llm:
    x-defang-llm: true
    image: "llm:latest"

  gateway-with-ports:
    x-defang-llm: true
    image: "litellm/litellm:latest"
    ports:
      - 5678:5678

  gateway-without-ports:
    x-defang-llm: true
    image: "litellm/litellm:latest"
