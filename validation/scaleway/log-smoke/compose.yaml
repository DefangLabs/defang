name: scaleway-log-smoke
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - mode: ingress
        target: 8080
        published: 8080
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
